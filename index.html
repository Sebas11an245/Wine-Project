<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wines of the World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400..700&family=Jim+Nightshade&family=Playfair+Display+SC&family=Yesteryear&display=swap" rel="stylesheet">  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Wines of the World</h1>
    <p class="subtitle">Explore grapes, regions, and sparkling traditions across the globe.</p>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search grape, region, or alias..." />

      <select id="typeFilter">
        <option value="all">All Types</option>
        <option value="red">Red</option>
        <option value="white">White</option>
        <option value="sparkling">Sparkling</option>
      </select>

      <select id="continentFilter">
        <option value="all">All Continents</option>
        <option value="North America">North America</option>
        <option value="Europe">Europe</option>
        <option value="South America">South America</option>
        <option value="Oceania">Oceania</option>
      </select>

      <select id="countryFilter">
        <option value="all">All Countries</option>
        <option value="USA">USA</option>
        <option value="France">France</option>
        <option value="Italy">Italy</option>
        <option value="Spain">Spain</option>
        <option value="Germany">Germany</option>
        <option value="Argentina">Argentina</option>
        <option value="Chile">Chile</option>
        <option value="Australia">Australia</option>
        <option value="South Africa">South Africa</option>
        <option value="Canada">Canada</option>
      </select>

      <select id="classificationFilter">
        <option value="all">Native + Hybrid</option>
        <option value="native">Native</option>
        <option value="hybrid">Hybrid</option>
      </select>

      <button id="sortBtn">Sort A–Z</button>
      <button id="resetBtn">Reset</button>
    </div>
  </header>

  <main>
    <div id="resultsCount" class="results-count"></div>
    <div id="wineContainer" class="grid"></div>
  </main>

  <script src="script.js"></script>
</body>

</html>
