<!DOCTYPE html>
<html lang="en">

<head>

    <title>Wine Explorer</title>

</head>
<>

    <header>
        <h1>🍷 Wine Explorer</h1>

        <div class="controls">

    </header>

    <main>
        <div id="wineContainer" class="grid"></div>
    </main>

    <script src="script.js"></script>
